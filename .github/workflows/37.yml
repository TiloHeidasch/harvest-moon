name: Scan Class A 37

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        classb: [0,8,16,24,32,40,48,56,64,72,80,88,96,104,112,120,128,136,144,152,160,168,176,184,192,200,208,216,224,232,240,248]
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq nmap
      - run: ./scan-classb.sh 37 ${{ matrix.classb }}
      - uses: actions/upload-artifact@v7
        with:
          name: scan-37-${{ matrix.classb }}
          path: results/

  aggregate:
    needs: scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v7
        with:
          pattern: scan-37-*
          merge-multiple: true
          path: downloaded/
      - run: |
          mkdir -p results
          cat downloaded/results/*.txt | sort -t. -k2,2n -k3,3n > results/37.txt
      - uses: actions/upload-artifact@v7
        with:
          name: classa-37
          path: results/37.txt
      - name: commit to result branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git fetch origin result || true
          git checkout -B result origin/result 2>/dev/null || git checkout -b result
          git add results/37.txt
          git commit -m "aggregate class A 37" || echo "nothing new"
          for i in 1 2 3 4 5 6 7 8; do
            git pull --rebase origin result 2>/dev/null
            git push origin result && break
            sleep 2
          done
