name: Render results (bin + manifest)

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

concurrency:
  group: render-results
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: fetch scan data from 'result' branch
        run: |
          git fetch origin result || true
          mkdir -p /tmp/scan-data
          git archive origin/result | tar -x -C /tmp/scan-data
      - name: convert txt -> bin + manifest
        run: python3 tools/csv2bin.py /tmp/scan-data/results --out /tmp/render-out
      - name: publish to 'result' branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git fetch origin result || true
          git checkout -B result origin/result 2>/dev/null || git checkout -b result
          cp /tmp/render-out/* .
          git add .
          git commit -m "render bin + manifest" || echo "nothing new"
          for i in $(seq 1 12); do
            git pull --rebase origin result 2>/dev/null || true
            git push origin "HEAD:refs/heads/result" && break
            sleep 3
          done
