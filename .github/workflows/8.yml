name: Scan Class A 128-143

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        classa: [128,129,130,131,132,133,134,135,136,137,138,139,140,141,142,143]
        classb: [0,16,32,48,64,80,96,112,128,144,160,176,192,208,224,240]
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq nmap
      - run: ./scan-classb.sh ${{ matrix.classa }} ${{ matrix.classb }} 16
      - uses: actions/upload-artifact@v7
        with:
          name: scan-${{ matrix.classa }}-${{ matrix.classb }}
          path: results/

  aggregate:
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v7
        with:
          pattern: scan-*
          merge-multiple: true
          path: downloaded/
      - name: stage render tool
        run: |
          mkdir -p /tmp/render-tool
          cp tools/csv2bin.py /tmp/render-tool/
      - name: build results/<A>.txt
        run: |
          mkdir -p results
          for ca in 128 129 130 131 132 133 134 135 136 137 138 139 140 141 142 143 ; do
            find downloaded -maxdepth 1 -name "${ca}.*.txt" -exec cat {} + | sort -t. -k2,2n -k3,3n > "results/${ca}.txt"
          done
      - uses: actions/upload-artifact@v7
        with:
          name: classa-8
          path: results/*.txt
      - name: commit scan result to result branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          for i in $(seq 1 20); do
            git fetch origin result || true
            git rebase --abort 2>/dev/null || true
            git merge --abort 2>/dev/null || true
            if git rev-parse --verify origin/result >/dev/null 2>&1; then
              git checkout -B result origin/result
              git reset --hard origin/result
            else
              git checkout -B result
            fi
            git add results/*.txt
            git commit -m "aggregate class A 128-143" || echo "nothing new"
            git push origin "HEAD:refs/heads/result" && break
            sleep 3
          done
      - name: render bin + manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          for i in $(seq 1 20); do
            git fetch origin result || true
            git rebase --abort 2>/dev/null || true
            git merge --abort 2>/dev/null || true
            if git rev-parse --verify origin/result >/dev/null 2>&1; then
              git checkout -B result origin/result
              git reset --hard origin/result
              git clean -fd
            else
              git checkout -B result
            fi
            python3 /tmp/render-tool/csv2bin.py ./results --out .
            git add '*.bin' manifest.json
            git commit -m "render bin + manifest" || echo "nothing new"
            git push origin "HEAD:refs/heads/result" && break
            sleep 3
          done
