name: Scan Class A 8

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        classb: [0,4,8,12,16,20,24,28,32,36]
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq nmap
      - run: ./scan-classb.sh 8 ${{ matrix.classb }}
      - uses: actions/upload-artifact@v7
        with:
          name: scan-8-${{ matrix.classb }}
          path: results/
