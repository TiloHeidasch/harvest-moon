name: Scan Class A 158

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        classb: [0,16,32,48,64,80,96,112,128,144,160,176,192,208,224,240]
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq nmap
      - run: ./scan-classb.sh 158 ${{ matrix.classb }} 16
      - uses: actions/upload-artifact@v7
        with:
          name: scan-158-${{ matrix.classb }}
          path: results/

  aggregate:
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v7
        with:
          pattern: scan-158-*
          merge-multiple: true
          path: downloaded/
      - run: |
          mkdir -p results
          find downloaded -name '*.txt' -exec cat {} + | sort -t. -k2,2n -k3,3n > results/158.txt
      - uses: actions/upload-artifact@v7
        with:
          name: classa-158
          path: results/158.txt
      - name: commit to result branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git fetch origin result || true
          git checkout -B result origin/result 2>/dev/null || git checkout -b result
          git add results/158.txt
          git commit -m "aggregate class A 158" || echo "nothing new"
          for i in $(seq 1 12); do
            git pull --rebase origin result 2>/dev/null || true
            git push origin "HEAD:refs/heads/result" && break
            sleep 3
          done
