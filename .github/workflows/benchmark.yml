name: Benchmark

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq fping nmap

      - name: ping 8.8.8.8 (ICMP check)
        run: ping -c 3 -W 2 8.8.8.8

      - name: fping 8.8.8.0/24
        run: |
          START=$(date +%s)
          fping -g 8.8.8.0/24 -a -r 0 -t 200 2>/dev/null | sort
          echo "fping $(( $(date +%s) - START ))s"

      - name: nmap 8.8.8.0/24
        run: |
          START=$(date +%s)
          nmap -sn -n -T5 --max-rtt-timeout 200ms 8.8.8.0/24
          echo "nmap $(( $(date +%s) - START ))s"
