name: Benchmark

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq fping nmap

      - name: fping 8.8.8.8 (ICMP double-check)
        run: fping 8.8.8.8 2>&1 || true

      - name: nmap 8.8.8.0/24
        run: |
          START=$(date +%s)
          nmap -sn -n -T5 --max-rtt-timeout 200ms 8.8.8.0/24 | grep 'Host is up'
          echo "nmap $(( $(date +%s) - START ))s"

      - name: bash /dev/tcp port 80 — 8.8.8.0/24
        run: |
          START=$(date +%s)
          for d in {0..255}; do
            (echo >/dev/tcp/8.8.8.$d/80) 2>/dev/null && echo "8.8.8.$d" &
          done
          wait
          echo "bash-tcp80 $(( $(date +%s) - START ))s"

      - name: bash /dev/tcp port 443 — 8.8.8.0/24
        run: |
          START=$(date +%s)
          for d in {0..255}; do
            (echo >/dev/tcp/8.8.8.$d/443) 2>/dev/null && echo "8.8.8.$d" &
          done
          wait
          echo "bash-tcp443 $(( $(date +%s) - START ))s"
